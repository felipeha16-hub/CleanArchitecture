# Apuntamos a la nueva base de datos de test, no a la de juan_updated

spring.datasource.url=${DB_TEST_URL:jdbc:postgresql://localhost:5432/user_test_db}
spring.datasource.username=${DB_TEST_USERNAME:root}
spring.datasource.password=${DB_TEST_PASSWORD:root}

# Hibernate crear· y destruir· las tablas autom·ticamente en cada test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

