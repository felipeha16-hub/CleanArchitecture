version: 2.1
orbs:
  gradle: circleci/gradle@3.0.0

jobs:
  build-and-test:
    docker:
      - image: cimg/openjdk:21.0
    steps:
      - checkout
      - gradle/with_cache:
          steps:
            - run:
                name: Build
                command: ./gradlew build
            - run:
                name: Test
                command: ./gradlew test
            - gradle/collect_test_results:
                reports_path: build/reports/
                test_results_path: build/test-results/

workflows:
  version: 2
  build:
    jobs:
      - build-and-test