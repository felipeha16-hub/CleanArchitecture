spring.application.name=${APP_NAME:Base API}

# ==========================================
# Base de Datos - PostgreSQL (Configuraciˇn Heroku)
# ==========================================
# Heroku inyecta automßticamente JDBC_DATABASE_URL al detectar el buildpack de Java
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/mi_base_db}
spring.datasource.username=${JDBC_DATABASE_USERNAME:root}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver
# ==========================================
# Servidor
# ==========================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/}

# ==========================================
# SpringDoc OpenAPI / Swagger
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.generate-ddl=${JPA_GENERATE_DDL:true}
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Logging
# ==========================================
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.example=${LOGGING_LEVEL_COM_EXAMPLE:DEBUG}

# ==========================================
# Pokemon API
# ==========================================
pokemon.api.timeout-seconds=${POKEMON_API_TIMEOUT_SECONDS:10}
pokemon.api.max-connections=${POKEMON_API_MAX_CONNECTIONS:50}

# ==========================================
# Manejo de errores
# ===========================================
app.exception-handler.enabled=true
