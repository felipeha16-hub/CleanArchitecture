# Test database configuration

spring.datasource.url=${DB_TEST_URL:jdbc:postgresql://localhost:5432/user_test_db}
spring.datasource.username=${DB_TEST_USERNAME:root}
spring.datasource.password=${DB_TEST_PASSWORD:root}

# Hibernate will create and destroy tables automatically in each test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable Flyway for tests (use create-drop instead)
spring.flyway.enabled=false
